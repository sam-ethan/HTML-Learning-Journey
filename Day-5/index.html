<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login form</title>
</head>
<body>
    <form action="">
        <label for="name">Enter your Name</label> <input type="text" id="name" required><br>

        <label for="email">enter your email</label><input type="email" id="email" required><br>

        <label for="no">contact no</label><input type="text" id="no" required><br>

        <select name="degree" id="degree"><br>
            <option value="bsc">bsc computer science</option>
            <option value="msc">msc computer science</option>
        </select><br>

        <input type="radio" name="gender" value="male">male
        <input type="radio" name="gender" value="female">female <br>

        <input type="checkbox" name="position" value="backend">backend
        <input type="checkbox" name="position" value="frontend">frontend
        <input type="checkbox" name="position" value="full stack">full stack

        <input type="file" name="resume"><br>

        <label for="message">enter your cover letter </label><textarea id="message" name="message"></textarea><br>
        <input type="date" name="submitDate"><br>
        <button type="submit">submit</button>
    </form>
</body>
</html>
