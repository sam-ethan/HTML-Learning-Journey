<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>colspan</title>
</head>
<body>
   
<table border="2">
    <tr>
        <th colspan="2">food</th>
        <th  colspan="3">price </th>

    </tr>
    <tr>
        <td rowspan="2">burger</td>
        <td rowspan="2">19rs</td>
        <td>item</td>
        <td>quantity</td>
        <td>price</td>
    </tr>
    <tr>
        <td>cheese burger</td>
        <td>1</td>
        <td>19rs</td>
    </tr>
</table>
</body>
</html>
